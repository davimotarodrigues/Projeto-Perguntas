<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Host - Quiz Multiplayer</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { font-family: Arial; background: #111; color: white; text-align: center; }
    .box { margin: auto; width: 600px; background: #222; padding: 20px; border-radius: 10px; }
    button { padding: 12px; margin: 10px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; }
    .green { background: #00ff99; font-weight: bold; }
    .blue { background: #448aff; color: white; font-weight: bold; }
    .list { text-align: left; margin-top: 20px; background: #333; padding: 15px; border-radius: 10px; }
    .player-item { padding: 8px 12px; margin: 4px 0; background: #444; border-radius: 6px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .player-item .dot { width: 8px; height: 8px; background: #00ff99; border-radius: 50%; flex-shrink: 0; }
    .player-count { color: #aaa; font-size: 14px; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="box">
    <h1>Host (Professor)</h1>

    <button class="green" onclick="startQuiz()">Começar Quiz</button>
    <button class="blue" onclick="nextQuestion()">Próxima Pergunta</button>

    <h2 id="questionTitle"></h2>

    <div class="list">
      <h3>👥 Jogadores conectados:</h3>
      <div id="playersList"></div>
      <p id="playerCount" class="player-count"></p>
    </div>

    <div class="list">
      <h3>🏆 Leaderboard</h3>
      <div id="leaderboard"></div>
    </div>
  </div>

<script>
  const socket = io();

  socket.on("updatePlayers", (players) => {
    document.getElementById("playersList").innerHTML =
      players.map(p =>
        `<div class="player-item">
          <span class="dot"></span>
          <span>${p.name}</span>
        </div>`
      ).join("");

    document.getElementById("playerCount").innerText =
      players.length + " jogador(es) na sala";
  });

  socket.on("newQuestion", (data) => {
    document.getElementById("questionTitle").innerText =
      `Pergunta ${data.index + 1}/${data.total}: ${data.question.question}`;
  });

  socket.on("leaderboardUpdate", (players) => {
    players.sort((a,b) => b.score - a.score);

    document.getElementById("leaderboard").innerHTML =
      players.map((p, i) => `<p>${i+1}. ${p.name} - ${p.score} pts</p>`).join("");
  });

  socket.on("quizEnded", () => {
    alert("Quiz terminou!");
  });

  function startQuiz() {
    socket.emit("startQuiz");
  }

  function nextQuestion() {
    socket.emit("nextQuestion");
  }
</script>

</body>
</html>
