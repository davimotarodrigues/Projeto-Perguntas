<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Host - Quiz Multiplayer</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { font-family: Arial; background: #111; color: white; text-align: center; margin: 0; padding: 20px; }
    .box { margin: auto; max-width: 700px; background: #222; padding: 30px; border-radius: 12px; }

    /* PIN da sala */
    .pin-box {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 2px solid #00ff99;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .pin-label { color: #aaa; font-size: 14px; margin: 0; }
    .pin-code {
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 12px;
      color: #00ff99;
      margin: 10px 0 0 0;
      font-family: 'Courier New', monospace;
    }

    /* Botões */
    button { padding: 14px 28px; margin: 10px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; transition: transform 0.1s; }
    button:hover { transform: scale(1.03); }
    button:active { transform: scale(0.97); }
    .green { background: #00ff99; font-weight: bold; font-size: 18px; padding: 16px 40px; }
    .blue { background: #448aff; color: white; font-weight: bold; font-size: 20px; padding: 18px 50px; }
    .restart { background: #ffbb33; color: #111; font-weight: bold; }

    /* Pergunta */
    .question-area {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 25px 30px;
      margin: 20px 0;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .question-area h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.4;
      color: #fff;
    }

    /* Botão centralizado durante quiz */
    .center-action {
      display: flex;
      justify-content: center;
      margin: 25px 0;
    }

    /* Listas */
    .list { text-align: left; margin-top: 20px; background: #333; padding: 15px; border-radius: 10px; }
    .player-item { padding: 8px 12px; margin: 4px 0; background: #444; border-radius: 6px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .player-item .dot { width: 8px; height: 8px; background: #00ff99; border-radius: 50%; flex-shrink: 0; }
    .player-count { color: #aaa; font-size: 14px; margin-top: 10px; }
    .leaderboard-item { padding: 8px 12px; margin: 4px 0; background: #444; border-radius: 6px; font-size: 15px; }
    /* Top 3 colorido */
    .leaderboard-item.rank-1 { background: linear-gradient(135deg, #b8860b, #daa520); color: #111; font-weight: bold; }
    .leaderboard-item.rank-2 { background: linear-gradient(135deg, #808080, #c0c0c0); color: #111; font-weight: bold; }
    .leaderboard-item.rank-3 { background: linear-gradient(135deg, #8b4513, #cd7f32); color: #fff; font-weight: bold; }

    /* Estados */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="box">
    <h1>🎮 Host (Professor)</h1>

    <!-- PIN DA SALA (antes do quiz e após o fim) -->
    <div id="pinBox" class="pin-box">
      <p class="pin-label">PIN DA SALA</p>
      <p class="pin-code" id="pinCode">------</p>
    </div>

    <!-- ÁREA DE ESPERA (antes do quiz) -->
    <div id="waitingArea">
      <button class="green" id="btnStart" onclick="startQuiz()">Começar Quiz</button>

      <div class="list">
        <h3>👥 Jogadores conectados:</h3>
        <div id="playersList"></div>
        <p id="playerCount" class="player-count"></p>
      </div>
    </div>

    <!-- ÁREA DO QUIZ (durante o quiz) -->
    <div id="quizArea" class="hidden">
      <div class="question-area">
        <h2 id="questionTitle">Aguardando pergunta...</h2>
      </div>

      <div class="center-action">
        <button class="blue" id="btnNext" onclick="nextQuestion()">Próxima Pergunta ➜</button>
      </div>

      <div class="list">
        <h3>🏆 Leaderboard</h3>
        <div id="leaderboard"></div>
      </div>
    </div>

    <!-- ÁREA DE FIM (quiz terminado) -->
    <div id="endedArea" class="hidden">
      <h2 style="color: #ffbb33; font-size: 28px;">🏁 Quiz Finalizado!</h2>

      <div class="list">
        <h3>🏆 Ranking Final</h3>
        <div id="finalLeaderboard"></div>
      </div>

      <button class="restart" onclick="restartQuiz()">🔄 Novo Quiz</button>
    </div>
  </div>

<script>
  const socket = io();

  // --- Recebe PIN da sala ---
  socket.on("roomPin", (pin) => {
    document.getElementById("pinCode").innerText = pin;
  });

  // --- Atualiza lista de jogadores ---
  socket.on("updatePlayers", (players) => {
    document.getElementById("playersList").innerHTML =
      players.map(p =>
        `<div class="player-item">
          <span class="dot"></span>
          <span>${p.name}</span>
        </div>`
      ).join("");

    document.getElementById("playerCount").innerText =
      players.length + " jogador(es) na sala";
  });

  // --- Quiz iniciado ---
  socket.on("quizStarted", () => {
    // Esconde PIN e botão Começar
    document.getElementById("pinBox").classList.add("hidden");
    document.getElementById("waitingArea").classList.add("hidden");

    // Mostra área do quiz
    document.getElementById("quizArea").classList.remove("hidden");
    document.getElementById("endedArea").classList.add("hidden");
  });

  // --- Nova pergunta ---
  socket.on("newQuestion", (data) => {
    document.getElementById("questionTitle").innerText =
      `Pergunta ${data.index + 1}/${data.total}\n${data.question.question}`;
  });

  // --- Atualização do leaderboard ---
  socket.on("leaderboardUpdate", (players) => {
    players.sort((a,b) => b.score - a.score);

    document.getElementById("leaderboard").innerHTML =
      players.map((p, i) => {
        const rankClass = i === 0 ? ' rank-1' : i === 1 ? ' rank-2' : i === 2 ? ' rank-3' : '';
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}º`;
        return `<div class="leaderboard-item${rankClass}">${medal} ${p.name} — ${p.score} pts</div>`;
      }).join("");
  });

  // --- Quiz terminou ---
  socket.on("quizEnded", (players) => {
    players.sort((a,b) => b.score - a.score);

    // Esconde área do quiz
    document.getElementById("quizArea").classList.add("hidden");

    // Mostra PIN novamente e área de fim
    document.getElementById("pinBox").classList.remove("hidden");
    document.getElementById("endedArea").classList.remove("hidden");

    document.getElementById("finalLeaderboard").innerHTML =
      players.map((p, i) => {
        const rankClass = i === 0 ? ' rank-1' : i === 1 ? ' rank-2' : i === 2 ? ' rank-3' : '';
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}º`;
        return `<div class="leaderboard-item${rankClass}">${medal} ${p.name} — ${p.score} pts</div>`;
      }).join("");
  });

  // --- Funções ---
  function startQuiz() {
    socket.emit("startQuiz");
  }

  function nextQuestion() {
    socket.emit("nextQuestion");
  }

  function restartQuiz() {
    location.reload();
  }
</script>

</body>
</html>
