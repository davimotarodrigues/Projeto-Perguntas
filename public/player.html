<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Player - Quiz Multiplayer</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { font-family: Arial; background: #111; color: white; text-align: center; }
    .box { margin: auto; width: 500px; background: #222; padding: 20px; border-radius: 10px; }
    input { padding: 10px; width: 80%; margin: 10px; border-radius: 8px; border: none; }
    button { padding: 12px; margin: 8px; width: 80%; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
    .a { background: #ff4444; color: white; }
    .b { background: #448aff; color: white; }
    .c { background: #00c853; color: white; }
    .d { background: #ffbb33; color: black; }
    .hidden { display: none; }
    .waiting-list { text-align: left; margin-top: 15px; background: #333; padding: 15px; border-radius: 10px; max-height: 250px; overflow-y: auto; }
    .waiting-list h3 { margin: 0 0 10px 0; color: #00ff99; }
    .player-item { padding: 8px 12px; margin: 4px 0; background: #444; border-radius: 6px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .player-item .dot { width: 8px; height: 8px; background: #00ff99; border-radius: 50%; flex-shrink: 0; }
    .player-count { color: #aaa; font-size: 14px; margin-top: 10px; }
    .waiting-title { color: #ffbb33; font-size: 18px; margin-bottom: 5px; }
    .pin-mini { background: #1a1a2e; border: 1px solid #00ff99; border-radius: 8px; padding: 10px 15px; margin: 10px 0; display: inline-block; }
    .pin-mini-label { color: #aaa; font-size: 12px; }
    .pin-mini-code { color: #00ff99; font-size: 24px; font-weight: bold; letter-spacing: 6px; font-family: 'Courier New', monospace; margin-left: 8px; }
  </style>
</head>
<body>

<div class="box">

  <div id="joinScreen">
    <h1>🎯 Entrar no Quiz</h1>
    <input id="nameInput" placeholder="Seu nome">
    <button onclick="joinGame()">Entrar</button>
  </div>

  <div id="waitingScreen" class="hidden">
    <h2 id="welcomeText"></h2>
    <div class="pin-mini">
      <span class="pin-mini-label">PIN DA SALA:</span>
      <span class="pin-mini-code" id="pinDisplay">------</span>
    </div>
    <p class="waiting-title">⏳ Esperando o host iniciar o quiz...</p>
    <div class="waiting-list">
      <h3>👥 Jogadores conectados:</h3>
      <div id="waitingPlayersList"></div>
      <p id="playerCount" class="player-count"></p>
    </div>
  </div>

  <div id="quizScreen" class="hidden">
    <h2 id="questionText">Esperando pergunta...</h2>
    <h3 id="timerText"></h3>

    <button class="a" onclick="sendAnswer('a')" id="btnA"></button>
    <button class="b" onclick="sendAnswer('b')" id="btnB"></button>
    <button class="c" onclick="sendAnswer('c')" id="btnC"></button>
    <button class="d" onclick="sendAnswer('d')" id="btnD"></button>

    <h2 id="resultText"></h2>
  </div>

  <div id="endScreen" class="hidden">
    <h2 style="color: #ffbb33;">🏁 Quiz Finalizado!</h2>
    <div class="waiting-list">
      <h3>🏆 Ranking Final</h3>
      <div id="finalRanking"></div>
    </div>
  </div>

</div>

<script>
  const socket = io();
  let timeLeft = 10;
  let timerInterval;
  let answered = false;
  let myName = "";

  function joinGame() {
    const name = document.getElementById("nameInput").value.trim();

    if (!name) {
      alert("Digite seu nome!");
      return;
    }

    myName = name;
    socket.emit("joinGame", { name });
  }

  socket.on("joinedGame", ({ pin }) => {
    document.getElementById("joinScreen").classList.add("hidden");
    document.getElementById("waitingScreen").classList.remove("hidden");
    document.getElementById("welcomeText").innerText = "Bem-vindo, " + myName + "!";
    document.getElementById("pinDisplay").innerText = pin;
  });

  socket.on("updatePlayers", (players) => {
    // Atualiza a lista na tela de espera
    const waitingList = document.getElementById("waitingPlayersList");
    const playerCount = document.getElementById("playerCount");

    if (waitingList) {
      waitingList.innerHTML = players.map(p =>
        `<div class="player-item">
          <span class="dot"></span>
          <span>${p.name}${p.name === myName ? ' (você)' : ''}</span>
        </div>`
      ).join("");
    }

    if (playerCount) {
      playerCount.innerText = players.length + " jogador(es) na sala";
    }
  });

  socket.on("newQuestion", (data) => {
    answered = false;
    clearInterval(timerInterval);

    // Transição: tela de espera → tela do quiz
    document.getElementById("waitingScreen").classList.add("hidden");
    document.getElementById("quizScreen").classList.remove("hidden");

    timeLeft = 10;
    document.getElementById("resultText").innerText = "";
    document.getElementById("questionText").innerText = data.question.question;

    document.getElementById("btnA").innerText = "A) " + data.question.answers.a;
    document.getElementById("btnB").innerText = "B) " + data.question.answers.b;
    document.getElementById("btnC").innerText = "C) " + data.question.answers.c;
    document.getElementById("btnD").innerText = "D) " + data.question.answers.d;

    document.getElementById("timerText").innerText = "Tempo: " + timeLeft;

    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById("timerText").innerText = "Tempo: " + timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        document.getElementById("resultText").innerText = "⏳ Tempo esgotado!";
        answered = true;
      }
    }, 1000);
  });

  function sendAnswer(choice) {
    if (answered) return;
    answered = true;

    socket.emit("submitAnswer", {
      answer: choice,
      timeLeft: timeLeft
    });

    document.getElementById("resultText").innerText = "Resposta enviada!";
  }

  socket.on("errorMessage", (msg) => {
    alert(msg);
  });

  socket.on("quizEnded", (players) => {
    players.sort((a,b) => b.score - a.score);

    clearInterval(timerInterval);

    document.getElementById("quizScreen").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");

    document.getElementById("finalRanking").innerHTML =
      players.map((p, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}º`;
        const you = p.name === myName ? ' ⬅ você' : '';
        return `<div class="player-item">
          <span>${medal} ${p.name}${you} — ${p.score} pts</span>
        </div>`;
      }).join("");
  });
</script>

</body>
</html>
